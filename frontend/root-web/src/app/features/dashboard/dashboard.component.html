<div class="dashboard-shell">
  <root-sidebar-nav />

  <div class="dashboard-shell__main">
    <root-app-header />

    <main class="dashboard">
      <root-greeting-header [userName]="userName()" [streakDays]="streakDays()" />

      <root-recommendation-card
        [recommendation]="recommendation()"
        (accept)="onAcceptRecommendation()"
        (viewAlternatives)="onViewAlternatives()"
        (dismiss)="onDismissRecommendation()"
      />

      <div class="dashboard__grid">
        <div class="dashboard__grid-main">
          <root-next-workout-card [workout]="nextWorkout()" (viewWorkout)="onViewWorkout()" />
          <root-weekly-summary [stats]="weeklyStats()" />
          <root-suggested-activities
            [activities]="suggestedActivities()"
            (selectActivity)="onSelectActivity($event)"
          />
        </div>

        <aside class="dashboard__grid-side">
          <root-recent-habits [entries]="recentHabits()" />
        </aside>
      </div>
    </main>
  </div>

  <root-bottom-nav />
</div>
