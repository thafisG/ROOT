<div [formGroup]="form()" class="step">
  <h2 class="step__title">Qual é o seu objetivo principal?</h2>
  <p class="step__subtitle">Isso vai nos ajudar a deixar sua experiência ainda melhor</p>

  <div class="options">
    @for (option of options; track option.value) {
      <button
        type="button"
        class="option"
        [class.option--selected]="form().get('goal')?.value === option.value"
        (click)="select(option.value)"
      >
        <span class="option__icon">
          <root-icon [name]="option.icon" [size]="20" />
        </span>
        <span class="option__text">
          <strong>{{ option.label }}</strong>
          <small>{{ option.description }}</small>
        </span>
      </button>
    }
  </div>
</div>
