<div [formGroup]="form()" class="step">
  <h2 class="step__title">Seus dados físicos</h2>
  <p class="step__subtitle">
    Usamos isso para calibrar a intensidade e o volume dos treinos sugeridos.
  </p>

  <div class="step__row">
    <label class="field">
      <span class="field__label">Idade</span>
      <input
        class="field__input"
        type="number"
        formControlName="age"
        placeholder="Anos"
        min="12"
        max="100"
      />
    </label>

    <label class="field">
      <span class="field__label">Altura (cm)</span>
      <input
        class="field__input"
        type="number"
        formControlName="heightCm"
        placeholder="Ex: 170"
        min="100"
        max="230"
      />
    </label>

    <label class="field">
      <span class="field__label">Peso (kg)</span>
      <input
        class="field__input"
        type="number"
        formControlName="weightKg"
        placeholder="Ex: 68"
        min="30"
        max="300"
      />
    </label>
  </div>

  @if (
    form().get('age')?.touched &&
    (form().get('age')?.invalid ||
      form().get('heightCm')?.invalid ||
      form().get('weightKg')?.invalid)
  ) {
    <span class="field__error">Preencha os três campos com valores válidos.</span>
  }
</div>
