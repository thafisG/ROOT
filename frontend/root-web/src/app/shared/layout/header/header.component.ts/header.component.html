<header class="header">
  <div class="header__brand">
    <img src="logo-root.2.0.png" alt="ROOT" width="20" height="20">
    <span class="header__brand-name">ROOT</span>
  </div>

  <div class="header__actions">
    <button type="button" class="header__icon-button" aria-label="Notificações">
      <app-root-icon name="sparkles" [size]="18" />
    </button>
    <div class="header__avatar" aria-hidden="true">{{ userInitials() }}</div>
  </div>
</header>
